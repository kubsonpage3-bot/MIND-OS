{% extends "admin/change_list.html" %}
{% load i18n %}

{% block result_list %}
    <div style="background: var(--body-bg); color: var(--body-fg); padding: 15px; margin-bottom: 20px; border-radius: 4px; border: 1px solid var(--border-color);">
        <h3 style="margin-top: 0; margin-bottom: 10px; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px;">Analytics Aggregate Summary</h3>
        <ul style="list-style-type: none; padding-left: 0; margin-bottom: 0; display: flex; flex-wrap: wrap; gap: 15px;">
            {% for ev in event_counts %}
                <li style="background: var(--darkened-bg); padding: 8px 12px; border-radius: 4px; border: 1px solid var(--border-color); display: flex; align-items: center; gap: 10px;">
                    <span style="font-weight: bold; color: var(--primary);">{{ ev.event_name }}</span>
                    <span style="background: var(--selected-bg); padding: 2px 8px; border-radius: 12px; font-size: 12px;">{{ ev.count }}</span>
                </li>
            {% empty %}
                <li>No events recorded yet.</li>
            {% endfor %}
        </ul>
    </div>
    {{ block.super }}
{% endblock %}
