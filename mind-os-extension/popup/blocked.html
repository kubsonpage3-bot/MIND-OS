<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Site Blocked — MIND OS</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');
    :root {
      --bg: #0d0d14; --purple: #7c3aed; --purple-glow: rgba(124,58,237,0.35);
      --gold: #f59e0b; --text: #e2e2f0; --dim: #6b6b8f; --border: #2a2a42;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Nunito', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .card {
      text-align: center; max-width: 420px; width: 90%;
      background: #13131f; border: 1px solid var(--border);
      border-radius: 16px; padding: 48px 36px;
    }
    .shield { font-size: 72px; display: block; margin-bottom: 16px;
      filter: drop-shadow(0 0 20px var(--purple-glow)); }
    h1 { font-size: 24px; font-weight: 900; color: #f8f8ff; margin-bottom: 8px; }
    .domain { font-size: 16px; font-weight: 700; color: var(--purple); margin-bottom: 16px; }
    .motivation {
      font-size: 14px; color: var(--dim); line-height: 1.7;
      background: rgba(124,58,237,0.08); border: 1px solid rgba(124,58,237,0.2);
      border-radius: 10px; padding: 14px 18px; margin-bottom: 24px;
    }
    .stats { display: flex; gap: 12px; justify-content: center; margin-bottom: 28px; }
    .stat {
      background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.25);
      border-radius: 10px; padding: 12px 20px; text-align: center;
    }
    .stat-val { font-size: 22px; font-weight: 900; color: var(--gold); display: block; }
    .stat-lbl { font-size: 11px; color: var(--dim); font-weight: 700; text-transform: uppercase; }
    .btn {
      padding: 12px 28px; border-radius: 10px; border: none; cursor: pointer;
      font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 15px;
      margin: 4px;
    }
    .btn-unlock { background: var(--purple); color: #fff; box-shadow: 0 0 20px var(--purple-glow); }
    .btn-unlock:hover { filter: brightness(1.15); }
    .btn-back { background: #1a1a2e; color: var(--dim); border: 1px solid var(--border); }
    .btn-back:hover { color: var(--text); }
    .cost-hint { font-size: 12px; color: var(--dim); margin-top: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <span class="shield">🛡</span>
    <h1>Site Blocked</h1>
    <p class="domain" id="blockedDomain">—</p>
    <div class="motivation">
      <strong>Stay focused, Hero.</strong><br/>
      You blocked this site to protect your productivity.<br/>
      Your tasks await. Your rewards are waiting.
    </div>
    <div class="stats" id="statsRow" style="display:none">
      <div class="stat">
        <span class="stat-val" id="goldStat">—</span>
        <span class="stat-lbl">🪙 Gold</span>
      </div>
      <div class="stat">
        <span class="stat-val" id="hpStat">—</span>
        <span class="stat-lbl">❤️ HP</span>
      </div>
    </div>
    <div>
      <button class="btn btn-unlock" id="unlockBtn" style="display:none">
        🔓 Unlock for <span id="unlockCostLabel">—</span> 🪙
      </button>
      <button class="btn btn-back" onclick="history.back()">← Go Back</button>
    </div>
    <p class="cost-hint" id="costHint"></p>
  </div>

  <script>
    async function init() {
      // Get blocked domain from URL param or referrer
      const params = new URLSearchParams(window.location.search);
      let domain = params.get('domain');
      if (!domain) {
        try { domain = new URL(document.referrer).hostname.replace(/^www\./, ''); } catch {}
      }
      if (domain) document.getElementById('blockedDomain').textContent = domain;

      // Load state from extension storage
      const { extensionToken, gold, hp, maxHp, blockedSites } =
        await browser.storage.local.get(['extensionToken', 'gold', 'hp', 'maxHp', 'blockedSites']);

      if (gold !== undefined) {
        document.getElementById('goldStat').textContent = gold.toLocaleString();
        document.getElementById('hpStat').textContent   = `${hp}/${maxHp}`;
        document.getElementById('statsRow').style.display = 'flex';
      }

      const site = (blockedSites || []).find((s) => s.domain === domain);
      if (site && extensionToken) {
        document.getElementById('unlockCostLabel').textContent = site.unlock_cost;
        document.getElementById('unlockBtn').style.display = 'inline-block';
        document.getElementById('costHint').textContent =
          `Unlocks for ${site.unlock_duration_minutes} minutes`;

        document.getElementById('unlockBtn').addEventListener('click', async () => {
          document.getElementById('unlockBtn').disabled = true;
          document.getElementById('unlockBtn').textContent = 'Unlocking…';

          const res = await browser.runtime.sendMessage({ type: 'UNLOCK_SITE', domain });
          if (res.ok) {
            document.getElementById('costHint').textContent =
              `✓ Unlocked! Reloading…`;
            setTimeout(() => window.location.reload(), 800);
          } else {
            const msg = res.error === 'insufficient_gold'
              ? `Not enough gold (have ${res.gold ?? 0} 🪙)`
              : 'Unlock failed. Try again.';
            document.getElementById('costHint').textContent = msg;
            document.getElementById('unlockBtn').disabled = false;
            document.getElementById('unlockBtn').textContent =
              `🔓 Unlock for ${site.unlock_cost} 🪙`;
          }
        });
      }
    }

    init();
  </script>
</body>
</html>
