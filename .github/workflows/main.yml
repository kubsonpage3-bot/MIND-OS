name: Django CI

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt
      - name: Run Linting
        working-directory: ./backend
        run: flake8 .
      - name: Run Tests
        working-directory: ./backend
        run: python manage.py test
