<!doctype html>
<html lang="en">
  <head>
    <!-- Google Consent Mode v2 Setup -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      
      (function() {
        var consent = 'denied';
        try {
          consent = localStorage.getItem('mindos_consent_analytics') || 'denied';
        } catch (e) {}
        
        gtag('consent', 'default', {
          'analytics_storage': consent,
          'ad_storage': consent,
          'ad_user_data': consent,
          'ad_personalization': consent
        });
      })();

      gtag('js', new Date());
      gtag('config', 'G-7ZTTSCRTTC', { 'cookie_domain': 'mindos.pages.dev' });
    </script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-7ZTTSCRTTC"></script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="manifest" href="/manifest.json" />
    <title>Mind OS</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service Worker registered successfully:', reg.scope))
            .catch(err => console.error('Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
