    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Bypass SW registration on native Capacitor platform (Android/iOS)
          // Native push is handled by FCM directly, and SW caching interferes with native local assets.
          if (window.Capacitor && window.Capacitor.isNativePlatform()) {
            console.log('Running in Capacitor native platform - bypassing Service Worker registration.');
            
            // Unregister any existing service workers to ensure clean state
            navigator.serviceWorker.getRegistrations().then(registrations => {
              for (let registration of registrations) {
                registration.unregister();
                console.log('Unregistered existing Service Worker for native platform.');
              }
            });
            return;
          }

          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service Worker registered successfully:', reg.scope))
            .catch(err => console.error('Service Worker registration failed:', err));
        });
      }
    </script>
